<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEET - Syllabus Hub</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- CSS Styles -->
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background-color: #030307;
      color: #f3f4f6;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .syllabus-layout {
      max-width: 1200px;
      margin: 100px auto 40px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 30px;
    }
    .syllabus-sidebar {
      background: rgba(10, 10, 18, 0.45);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 20px;
      height: fit-content;
    }
    .sidebar-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: 0 0 8px var(--neon-cyan-glow);
      letter-spacing: 1px;
      margin-bottom: 20px;
      font-family: var(--font-cyber);
    }
    .syllabus-tab-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tab-item-btn {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      color: #9ca3af;
      border-radius: 12px;
      padding: 12px 16px;
      text-align: left;
      font-family: var(--font-cyber);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tab-item-btn:hover {
      background: rgba(0, 242, 254, 0.05);
      color: #fff;
      border-color: rgba(0, 242, 254, 0.3);
    }
    .tab-item-btn.active {
      background: linear-gradient(135deg, rgba(0, 242, 254, 0.15), rgba(157, 78, 221, 0.15));
      color: #fff;
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
    }
    .syllabus-main-panel {
      background: rgba(10, 10, 18, 0.45);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 35px;
    }
    .syllabus-header-block {
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 20px;
      margin-bottom: 25px;
    }
    .syllabus-title {
      font-size: 26px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 8px;
      font-family: var(--font-cyber);
    }
    .syllabus-desc {
      color: #9ca3af;
      line-height: 1.6;
      font-size: 14px;
    }
    .resources-title-bar {
      font-size: 14px;
      color: var(--neon-cyan);
      letter-spacing: 0.5px;
      margin-bottom: 15px;
      font-family: var(--font-cyber);
    }
    .grid-card-resource {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 14px 18px;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .grid-card-resource:hover {
      background: rgba(0, 242, 254, 0.05);
      border-color: rgba(0, 242, 254, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 242, 254, 0.15);
    }
    @media (max-width: 900px) {
      .syllabus-layout {
        grid-template-columns: 1fr;
        margin-top: 80px;
      }
    }
  </style>
</head>
<body class="apple-theme">
  <!-- Ambient glows -->
  <div class="ambient-glows">
    <div class="glow-sphere glow-sphere-1" style="background: radial-gradient(circle, rgba(157, 78, 221, 0.18) 0%, transparent 70%);"></div>
    <div class="glow-sphere glow-sphere-2" style="background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, transparent 70%);"></div>
  </div>

  <!-- Colorful Graduation Cap Background Graphic -->
  <div id="bg-grad-cap" class="corner-grad-cap">
    <i class="fa-solid fa-graduation-cap"></i>
  </div>

  <!-- Navigation Bar -->
  <nav class="top-nav glassmorphic">
    <div class="nav-brand">
      <i class="fa-solid fa-graduation-cap logo-icon"></i>
      <span>VISION<span class="neon-purple-text">X</span> // NEET SYLLABUS</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a>
    </div>
  </nav>

  <div class="syllabus-layout">
    <!-- Sidebar -->
    <aside class="syllabus-sidebar">
      <h4 class="sidebar-title"><i class="fa-solid fa-graduation-cap"></i> SELECT SUBJECT</h4>
      <div class="syllabus-tab-list">
        <button class="tab-item-btn active" data-subj="physics">🧲 Physics</button>
        <button class="tab-item-btn" data-subj="chemistry">🧪 Chemistry</button>
        <button class="tab-item-btn" data-subj="botany">🌿 Botany</button>
        <button class="tab-item-btn" data-subj="zoology">🦁 Zoology</button>
        <button class="tab-item-btn" data-subj="plant">🌱 Plant Physiology</button>
        <button class="tab-item-btn" data-subj="human">🧬 Human Physiology</button>
      </div>
    </aside>

    <!-- Main Syllabus content -->
    <main class="syllabus-main-panel">
      <div class="syllabus-header-block">
        <h2 id="disp-title" class="syllabus-title">Physics</h2>
        <p id="disp-desc" class="syllabus-desc">Core mechanical and wave physics principles: Kinematics, Laws of Motion, Thermodynamics, and Electrostatics.</p>
        <div style="margin-top: 15px;">
          <button id="btn-download-core" class="action-btn neon-btn-cyan" style="font-size: 11px; padding: 8px 16px;">
            <i class="fa-solid fa-file-pdf"></i> DOWNLOAD CORE SYLLABUS OUTLINE (PDF)
          </button>
        </div>
      </div>

      <div class="syllabus-resources-section">
        <h5 class="resources-title-bar">
          <i class="fa-solid fa-folder-open"></i> AVAILABLE STUDY RESOURCES (VERIFIED PDF COMPILATIONS)
        </h5>
        <div id="resources-grid-box" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px;">
          <!-- Dynamically loaded resource cards -->
        </div>
      </div>
    </main>
  </div>

  <script>
    // NEET Subject Syllabi Data
    const neetData = {
      physics: {
        title: "Physics",
        description: "Core mechanical and wave physics principles: Kinematics, Laws of Motion, Thermodynamics, and Electrostatics.",
        resources: [
          { name: "NEET Physics Blueprint.pdf", size: "155 KB" },
          { name: "Electrostatics derivations sheet.pdf", size: "320 KB" },
          { name: "Mock Physics problems guide.pdf", size: "1.2 MB" }
        ],
        topics: ["Kinematics & Laws of Motion", "Work, Energy & Power", "Rotational Motion", "Thermodynamics", "Electrostatics & Magnetism", "Optics & Modern Physics"]
      },
      chemistry: {
        title: "Chemistry",
        description: "Excel in chemical configurations: Periodic Classification, Organic Mechanisms, Chemical Equilibrium, and Biomolecules.",
        resources: [
          { name: "NEET Chemistry Blueprint.pdf", size: "135 KB" },
          { name: "Organic reaction pathways.pdf", size: "480 KB" },
          { name: "Inorganic trends quick cheat.pdf", size: "290 KB" }
        ],
        topics: ["Basic Concepts & Atomic Structure", "Periodic Table trends & bonding", "Equilibrium & Thermodynamics", "Organic Chemistry basics & reactions", "Biomolecules & Polymers"]
      },
      botany: {
        title: "Botany",
        description: "Master plant biology: Cell Structure, Genetics, Plant Kingdom taxonomy, and Biotechnology.",
        resources: [
          { name: "NEET Botany Blueprint.pdf", size: "128 KB" },
          { name: "Cell Structure study sheets.pdf", size: "340 KB" },
          { name: "Genetics Mendel notes.pdf", size: "195 KB" }
        ],
        topics: ["Diversity of Living World (Plants)", "Structural Organisation in Plants", "Cell Biology & Cell Cycle", "Plant Genetics & Inheritance", "Biotechnology Principles"]
      },
      zoology: {
        title: "Zoology",
        description: "Master animal taxonomy, Structural Organisation in Animals, Human Health & Diseases, and Evolution.",
        resources: [
          { name: "NEET Zoology Blueprint.pdf", size: "115 KB" },
          { name: "Animal Kingdom classification.pdf", size: "520 KB" },
          { name: "Human Diseases cheat sheet.pdf", size: "210 KB" }
        ],
        topics: ["Animal Diversity & Taxonomy", "Structural Organisation in Animals", "Human Health & Diseases", "Evolutionary Theories", "Ecology & Environment"]
      },
      plant: {
        title: "Plant Physiology",
        description: "Study plant metabolic functions: Photosynthesis, Respiration, Mineral Nutrition, and Plant Growth Hormones.",
        resources: [
          { name: "Plant Metabolism Outline.pdf", size: "108 KB" },
          { name: "Photosynthesis Cycles sheet.pdf", size: "410 KB" },
          { name: "Growth Regulators notes.pdf", size: "150 KB" }
        ],
        topics: ["Transport in Plants", "Mineral Nutrition", "Photosynthesis in Higher Plants", "Respiration in Plants", "Plant Growth and Development"]
      },
      human: {
        title: "Human Physiology",
        description: "Review organ systems: Digestion, Respiration, Circulation, Excretion, Coordination, and Reproduction.",
        resources: [
          { name: "Human Physiology Map.pdf", size: "162 KB" },
          { name: "Nervous Coordination guide.pdf", size: "780 KB" },
          { name: "Endocrine Hormones list.pdf", size: "295 KB" }
        ],
        topics: ["Digestion & Absorption", "Breathing & Exchange of Gases", "Circulatory Systems & Excretion", "Neural Control & Coordination", "Chemical Coordination (Endocrine)", "Human Reproduction"]
      }
    };

    let activeSubject = 'physics';

    // Selectors
    const tabBtns = document.querySelectorAll('.tab-item-btn');
    const dispTitle = document.getElementById('disp-title');
    const dispDesc = document.getElementById('disp-desc');
    const resourcesGrid = document.getElementById('resources-grid-box');
    const btnDownloadCore = document.getElementById('btn-download-core');

    // Tab Handlers
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSubject = btn.getAttribute('data-subj');
        renderSubjectDetails();
      });
    });

    function renderSubjectDetails() {
      const data = neetData[activeSubject];
      dispTitle.innerText = data.title;
      dispDesc.innerText = data.description;

      // Populate resource cards
      resourcesGrid.innerHTML = '';
      data.resources.forEach(res => {
        const card = document.createElement('div');
        card.className = 'grid-card-resource';
        card.innerHTML = `
          <i class="fa-solid fa-file-pdf resource-icon-badge"></i>
          <div class="resource-info">
            <div class="resource-name">${res.name}</div>
            <div class="resource-size">${res.size} • PDF Reference</div>
          </div>
          <i class="fa-solid fa-download resource-dl-arrow"></i>
        `;
        card.addEventListener('click', () => {
          downloadResourceFile('NEET', activeSubject, res.name);
        });
        resourcesGrid.appendChild(card);
      });
    }

    // Download handlers
    btnDownloadCore.addEventListener('click', () => {
      const data = neetData[activeSubject];
      const fileTitle = `NEET - ${data.title.toUpperCase()} OFFICIAL SYLLABUS BLUEPRINT`;
      let topicsListText = data.topics.map((t, i) => `${i + 1}. ${t}`).join('\n');
      
      const content = `======================================================================
${fileTitle}
======================================================================
Course: National Eligibility cum Entrance Test (NEET Medical)
Subject: ${data.title}
Generated On: ${new Date().toLocaleDateString()}

Syllabus Scope & Objectives:
-----------------------------
${data.description}

Core Topics to Master:
-----------------------------
${topicsListText}

VISIONX gateway verification: SECURE HANDSHAKE ACTIVE
======================================================================`;

      triggerFileDownload('neet', `${activeSubject}_syllabus_blueprint.txt`, content);
    });

    function downloadResourceFile(board, subject, fileName) {
      const content = `======================================================================
${board} - ${subject.toUpperCase()} - ${fileName.toUpperCase()}
======================================================================
Resource: ${fileName}
Generated: ${new Date().toLocaleDateString()}
Status: VERIFIED SECURE SYLLABUS REFERENCE COPY

Outline:
This study guide compiles the recommended revision parameters, timeline, and 
chapters required to perfect the student in ${subject.toUpperCase()} syllabus.

----------------------------------------------------------------------
Verification: SHA256-RES-${board}-${subject.toUpperCase()}
======================================================================`;

      triggerFileDownload(board, `${subject}_${fileName.toLowerCase().replace('.pdf', '.txt')}`, content);
    }

    function triggerFileDownload(board, fileName, textContent) {
      const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${board.toLowerCase()}_${fileName}`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Always sliding highlight highlight transition helper
    const tabList = document.querySelector('.syllabus-tab-list');
    let autoSlideInterval;
    function startAutoSlide() {
      autoSlideInterval = setInterval(() => {
        const buttons = Array.from(tabBtns);
        const currentIndex = buttons.findIndex(b => b.classList.contains('active'));
        const nextIndex = (currentIndex + 1) % buttons.length;
        buttons[nextIndex].click();
      }, 7000);
    }
    if (tabList) {
      tabList.addEventListener('mouseenter', () => clearInterval(autoSlideInterval));
      tabList.addEventListener('mouseleave', startAutoSlide);
    }
    startAutoSlide();

    // Initialize
    renderSubjectDetails();
  </script>
<script src="bg_spawner.js"></script>
</body>
</html>
