<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EAPCET - Testing Center</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- CSS Styles -->
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background-color: #030307;
      color: #f3f4f6;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .testing-layout {
      max-width: 1200px;
      margin: 100px auto 40px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 30px;
    }
    .testing-sidebar {
      background: rgba(10, 10, 18, 0.45);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 20px;
      height: fit-content;
    }
    .sidebar-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: 0 0 8px var(--neon-cyan-glow);
      letter-spacing: 1px;
      margin-bottom: 20px;
      font-family: var(--font-cyber);
    }
    .tab-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tab-btn-item {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      color: #9ca3af;
      border-radius: 12px;
      padding: 12px 16px;
      text-align: left;
      font-family: var(--font-cyber);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tab-btn-item:hover {
      background: rgba(0, 242, 254, 0.05);
      color: #fff;
      border-color: rgba(0, 242, 254, 0.3);
    }
    .tab-btn-item.active {
      background: linear-gradient(135deg, rgba(0, 242, 254, 0.15), rgba(157, 78, 221, 0.15));
      color: #fff;
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
    }
    .testing-main-panel {
      background: rgba(10, 10, 18, 0.45);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 35px;
      position: relative;
    }
    .tests-header-block {
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }
    .tests-title {
      font-size: 26px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 5px;
      font-family: var(--font-cyber);
    }
    .tests-desc {
      color: #9ca3af;
      font-size: 14px;
    }
    .test-list-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .test-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }
    .test-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateX(4px);
    }
    .test-info h5 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }
    .test-info p {
      font-size: 12px;
      color: #9ca3af;
    }
    @media (max-width: 900px) {
      .testing-layout {
        grid-template-columns: 1fr;
        margin-top: 80px;
      }
    }
  </style>
</head>
<body class="apple-theme">
  <!-- Ambient Glows -->
  <div class="ambient-glows">
    <div class="glow-sphere glow-sphere-1" style="background: radial-gradient(circle, rgba(157, 78, 221, 0.18) 0%, transparent 70%);"></div>
    <div class="glow-sphere glow-sphere-2" style="background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, transparent 70%);"></div>
  </div>

  <!-- Graduation Cap Background -->
  <div id="bg-grad-cap" class="corner-grad-cap">
    <i class="fa-solid fa-graduation-cap"></i>
  </div>

  <!-- Top Navigation Bar -->
  <nav class="top-nav glassmorphic">
    <div class="nav-brand">
      <i class="fa-solid fa-graduation-cap logo-icon"></i>
      <span>VISION<span class="neon-purple-text">X</span> // EAPCET EXAMS</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a>
    </div>
  </nav>

  <div class="testing-layout">
    <!-- Sidebar -->
    <aside class="testing-sidebar">
      <h4 class="sidebar-title"><i class="fa-solid fa-graduation-cap"></i> EXAM SUBJECTS</h4>
      <div class="tab-list">
        <button class="tab-btn-item active" data-subj="math">📐 Mathematics</button>
        <button class="tab-btn-item" data-subj="physics">🧲 Physics</button>
        <button class="tab-btn-item" data-subj="chemistry">🧪 Chemistry</button>
        <button class="tab-btn-item" data-subj="botany">🌿 Botany</button>
        <button class="tab-btn-item" data-subj="zoology">🦁 Zoology</button>
        <button class="tab-btn-item" data-subj="agri">🌾 Agricultural Science</button>
      </div>
    </aside>

    <!-- Main Exam Panel -->
    <main class="testing-main-panel">
      <!-- Exam Selector View -->
      <div id="exam-selector-view">
        <div class="tests-header-block">
          <h2 id="disp-title" class="tests-title">Mathematics</h2>
          <p id="disp-desc" class="tests-desc">Build complex problem-solving speed: Algebra, Vector Algebra, Trigonometry, Coordinate Geometry, and Calculus.</p>
        </div>
        <div id="tests-list-container" class="test-list-box">
          <!-- Dynamically generated tests list -->
        </div>
      </div>

      <!-- Active Test Taker Area (Hidden by default) -->
      <div id="active-test-panel" class="active-test-panel hidden" style="margin-top: 0;">
        <div class="test-header">
          <h4 id="active-test-title">Mock Test 1: Mathematics</h4>
          <button id="cancel-test-btn" class="action-btn-outline">Cancel Test</button>
        </div>
        <div id="test-questions-box">
          <!-- Dynamic Questions Load Here -->
        </div>
        <button id="submit-test-btn" class="action-btn neon-btn-green">SUBMIT MOCK TEST</button>
        <div id="test-results-feedback" class="quiz-feedback hidden"></div>
      </div>
    </main>
  </div>

  <script>
    // EAPCET Subject Syllabi & Mock Exams Data
    const eapcetData = {
      math: {
        title: "Mathematics",
        description: "Build complex problem-solving speed: Algebra, Vector Algebra, Trigonometry, Coordinate Geometry, and Calculus.",
        tests: {
          1: [
            { q: "Let f(x) = √(x² - 4). The domain of f(x) is:", o: ["(-∞, -2] U [2, ∞)", "[-2, 2]", "(2, ∞)", "All real numbers"], a: 0 },
            { q: "The value of the determinant of a 3x3 identity matrix is:", o: ["0", "1", "3", "Undefined"], a: 1 },
            { q: "The angle between two vectors A = i + j and B = i - j is:", o: ["0°", "45°", "90°", "180°"], a: 2 }
          ],
          2: [
            { q: "The equation of circle concentric with x² + y² - 4x - 6y - 9 = 0 and passing through (0,0) is:", o: ["x² + y² - 4x - 6y = 0", "x² + y² + 4x + 6y = 0", "x² + y² = 13", "x² + y² - 4x = 0"], a: 0 },
            { q: "The limit of (1 - cos x) / x² as x approaches 0 is:", o: ["0", "1", "1/2", "Undefined"], a: 2 },
            { q: "The integral of e^x sin x dx is:", o: ["e^x(sin x - cos x)/2 + C", "e^x(sin x + cos x)/2 + C", "e^x sin x + C", "e^x cos x + C"], a: 0 }
          ],
          3: [
            { q: "For a given distribution, if variance is 36, then standard deviation is:", o: ["6", "18", "72", "36"], a: 0 },
            { q: "If A and B are mutually exclusive events, then P(A U B) is equal to:", o: ["P(A) + P(B)", "P(A) * P(B)", "P(A) - P(B)", "0"], a: 0 },
            { q: "The focus of the parabola y² = 12x is:", o: ["(3, 0)", "(0, 3)", "(-3, 0)", "(0, -3)"], a: 0 }
          ]
        }
      },
      physics: {
        title: "Physics",
        description: "Excel in standard physical conceptual formulas: Waves, Ray Optics, Thermodynamics, Electrostatic Potential, and Magnetic Effects.",
        tests: {
          1: [
            { q: "The velocity of light in water (refractive index = 1.33) is approximately:", o: ["2.25 × 10⁸ m/s", "3.00 × 10⁸ m/s", "1.50 × 10⁸ m/s", "2.00 × 10⁸ m/s"], a: 0 },
            { q: "The thermodynamic cycle of Carnot consists of how many isothermal processes?", o: ["1", "2", "3", "4"], a: 1 },
            { q: "The capacity of a parallel plate capacitor is independent of:", o: ["Area of plates", "Distance between plates", "Medium between plates", "Charge on plates"], a: 3 }
          ],
          2: [
            { q: "Which electromagnetic wave has the highest frequency?", o: ["Gamma rays", "X-rays", "Radio waves", "Microwaves"], a: 0 },
            { q: "The force of attraction between two point charges separated by distance r varies as:", o: ["r", "r²", "1/r", "1/r²"], a: 3 },
            { q: "A magnetic needle suspended freely always aligns along which direction?", o: ["Geographical East-West", "Geographical North-South", "Magnetic East-West", "Inclined at 45°"], a: 1 }
          ],
          3: [
            { q: "According to de Broglie relation, wavelength of a moving particle is:", o: ["h / p", "h * p", "p / h", "h / mc²"], a: 0 },
            { q: "The half-life of a radioactive sample depends on its:", o: ["Decay constant", "Initial concentration", "Temperature", "Pressure"], a: 0 },
            { q: "Which gate is called a universal gate?", o: ["AND gate", "OR gate", "NOT gate", "NAND gate"], a: 3 }
          ]
        }
      },
      chemistry: {
        title: "Chemistry",
        description: "Excel in general chemical configurations: Atomic Structure, Chemical Bonding, Organic Compounds, Coordination Chemistry, and Thermodynamics.",
        tests: {
          1: [
            { q: "Which orbital quantum number is designated by l = 2?", o: ["s orbital", "p orbital", "d orbital", "f orbital"], a: 2 },
            { q: "The shape of methane (CH₄) molecule is:", o: ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], a: 2 },
            { q: "An endothermic reaction is one in which enthalpy change (ΔH) is:", o: ["Positive", "Negative", "Zero", "Infinity"], a: 0 }
          ],
          2: [
            { q: "The coordination number of cobalt in [Co(NH₃)₆]Cl₃ is:", o: ["3", "6", "9", "4"], a: 1 },
            { q: "Which of the following organic compounds decolorizes bromine water?", o: ["Methane", "Ethane", "Ethylene", "Propane"], a: 2 },
            { q: "The primary product of the reaction between an acid and a base is:", o: ["Hydrogen gas", "Oxygen gas", "Salt and water", "Carbon dioxide"], a: 2 }
          ],
          3: [
            { q: "The catalyst used in Haber's process for manufacture of ammonia is:", o: ["Finely divided Iron", "Nickel", "Platinum", "Copper"], a: 0 },
            { q: "Which of the following forms of carbon is used as a lubricant?", o: ["Diamond", "Graphite", "Coke", "Charcoal"], a: 1 },
            { q: "The element with the highest electronegativity in the periodic table is:", o: ["Oxygen", "Fluorine", "Chlorine", "Nitrogen"], a: 1 }
          ]
        }
      },
      botany: {
        title: "Botany",
        description: "Study botanical structures: Diversity in living world, Structural Organization, Plant Systematics, Cell biology, and Genetics.",
        tests: {
          1: [
            { q: "The double membrane structure that contains genetic materials in a plant cell is:", o: ["Nucleus", "Mitochondria", "Chloroplast", "Vacuole"], a: 0 },
            { q: "Which plant group is commonly called vascular cryptogams?", o: ["Algae", "Bryophytes", "Pteridophytes", "Gymnosperms"], a: 2 },
            { q: "The study of internal tissue arrangements in plant roots is:", o: ["Anatomy", "Morphology", "Taxonomy", "Ecology"], a: 0 }
          ],
          2: [
            { q: "During light reaction of photosynthesis, which molecule is split to release oxygen?", o: ["Carbon Dioxide", "Water", "Glucose", "Chlorophyll"], a: 1 },
            { q: "The hormone responsible for ripening of fruits is:", o: ["Auxin", "Cytokinin", "Gibberellin", "Ethylene"], a: 3 },
            { q: "Who is known as the father of genetics?", o: ["Gregor Mendel", "Charles Darwin", "Lamarck", "Watson"], a: 0 }
          ],
          3: [
            { q: "The process of transfer of pollen from anther to stigma is:", o: ["Fertilization", "Pollination", "Germination", "Respiration"], a: 1 },
            { q: "Which of the following plant cells are dead at maturity?", o: ["Parenchyma", "Collenchyma", "Sclerenchyma", "Companion cells"], a: 2 },
            { q: "The basic unit of classification is:", o: ["Genus", "Family", "Species", "Order"], a: 2 }
          ]
        }
      },
      zoology: {
        title: "Zoology",
        description: "Master animal biology structures: Human Anatomy & Physiology, Locomotion, Reproduction, and Applied Biology.",
        tests: {
          1: [
            { q: "Which component of blood acts as a primary barrier against infections?", o: ["Red Blood Cells", "White Blood Cells", "Blood Platelets", "Plasma proteins"], a: 1 },
            { q: "The functional unit of skeletal contraction in muscle fibers is:", o: ["Sarcomere", "Myofibril", "Actin", "Myosin"], a: 0 },
            { q: "In human body, the hormone insulin is secreted by cells of:", o: ["Thyroid gland", "Adrenal gland", "Islets of Langerhans", "Pituitary gland"], a: 2 }
          ],
          2: [
            { q: "The structural unit of mammalian lungs where gas exchange occurs is:", o: ["Bronchiole", "Trachea", "Alveoli", "Pleura"], a: 2 },
            { q: "Which animal group is characterized by pneumatic (hollow) bones?", o: ["Amphibia", "Reptilia", "Aves (Birds)", "Mammalia"], a: 2 },
            { q: "The term 'vector' in malaria transmission refers to:", o: ["Plasmodium", "Female Anopheles mosquito", "Male Anopheles", "Human host"], a: 1 }
          ],
          3: [
            { q: "Which cranial nerve is responsible for the sense of smell?", o: ["Optic nerve", "Olfactory nerve", "Vagus nerve", "Facial nerve"], a: 1 },
            { q: "The nitrogenous waste excreted by birds is primarily in the form of:", o: ["Ammonia", "Urea", "Uric acid", "Creatinine"], a: 2 },
            { q: "The human fetus is connected to the uterine wall by the:", o: ["Amnion", "Placenta", "Allantois", "Yolk sac"], a: 1 }
          ]
        }
      },
      agri: {
        title: "Agricultural Science",
        description: "Review agrarian parameters: Crop Production technology, Soil Science, Horticulture basics, and Crop Protection methods.",
        tests: {
          1: [
            { q: "The primary plant nutrients required in large quantities are:", o: ["Nitrogen, Phosphorus, Potassium", "Iron, Zinc, Copper", "Calcium, Magnesium, Sulfur", "Boron, Manganese, Chlorine"], a: 0 },
            { q: "The process of removing excess soil water to improve crop aeration is:", o: ["Irrigation", "Tillage", "Drainage", "Mulching"], a: 2 },
            { q: "Which soil type has the highest water-holding capacity?", o: ["Sandy soil", "Silty soil", "Clayey soil", "Sandy loam"], a: 2 }
          ],
          2: [
            { q: "The branch of agriculture dealing with cultivation of garden crops (fruits, vegetables) is:", o: ["Agronomy", "Horticulture", "Olericulture", "Floriculture"], a: 1 },
            { q: "The chemical used to control unwanted weeds in a crop field is called a:", o: ["Fungicide", "Insecticide", "Herbicide", "Nematicide"], a: 2 },
            { q: "Which crop is known as the 'Queen of Cereals'?", o: ["Wheat", "Rice", "Maize", "Barley"], a: 2 }
          ],
          3: [
            { q: "The system of growing two or more crops simultaneously in the same field is:", o: ["Monocropping", "Mixed cropping", "Crop rotation", "Fallowing"], a: 1 },
            { q: "Green house effect in agriculture is used to create:", o: ["High humidity", "Controlled microclimate", "Shade effect", "Open aeration"], a: 1 },
            { q: "The standard tool used for testing soil pH is a:", o: ["Hygrometer", "pH meter", "Anemometer", "Tensiometer"], a: 1 }
          ]
        }
      }
    };

    let activeSubject = 'math';
    let activeTestNum = 1;

    // Selectors
    const tabBtns = document.querySelectorAll('.tab-btn-item');
    const dispTitle = document.getElementById('disp-title');
    const dispDesc = document.getElementById('disp-desc');
    const selectorView = document.getElementById('exam-selector-view');
    const testsList = document.getElementById('tests-list-container');

    const activeTestPanel = document.getElementById('active-test-panel');
    const activeTestTitle = document.getElementById('active-test-title');
    const questionsBox = document.getElementById('test-questions-box');
    const submitBtn = document.getElementById('submit-test-btn');
    const cancelBtn = document.getElementById('cancel-test-btn');
    const resultsFeedback = document.getElementById('test-results-feedback');

    // Tab Handlers
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSubject = btn.getAttribute('data-subj');
        resetActiveTest();
        renderSubjectDetails();
      });
    });

    function renderSubjectDetails() {
      const data = eapcetData[activeSubject];
      dispTitle.innerText = data.title;
      dispDesc.innerText = data.description;

      testsList.innerHTML = '';
      
      const testsMeta = [
        { level: "Foundation Level", xp: "10 XP", focus: "General Syllabus Intro" },
        { level: "Intermediate Level", xp: "15 XP", focus: "Formula Applications" },
        { level: "Advanced Level", xp: "25 XP", focus: "Hard Problem Solving" }
      ];

      [1, 2, 3].forEach(num => {
        const meta = testsMeta[num - 1];
        const card = document.createElement('div');
        card.className = 'test-card';
        card.innerHTML = `
          <div class="test-info">
            <h5>Mock Test ${num}: ${meta.level}</h5>
            <p>3 Questions • ${meta.xp} Reward • ${meta.focus}</p>
          </div>
          <button class="action-btn neon-btn-cyan start-test-btn" data-test="${num}">START TEST</button>
        `;
        
        card.querySelector('.start-test-btn').addEventListener('click', () => {
          activeTestNum = num;
          startMockTest();
        });
        
        testsList.appendChild(card);
      });
    }

    function startMockTest() {
      selectorView.classList.add('hidden');
      activeTestPanel.classList.remove('hidden');

      const questions = eapcetData[activeSubject].tests[activeTestNum];
      activeTestTitle.innerText = `Mock Test ${activeTestNum}: ${activeSubject.toUpperCase()}`;
      
      questionsBox.innerHTML = '';
      resultsFeedback.classList.add('hidden');
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';

      questions.forEach((q, idx) => {
        const group = document.createElement('div');
        group.className = 'quiz-question-group';
        group.innerHTML = `
          <p class="question-text">${idx + 1}. ${q.q}</p>
          <div class="quiz-options-col">
            ${q.o.map((opt, oIdx) => `
              <label class="quiz-opt-label">
                <input type="radio" name="q_${idx}" value="${oIdx}">
                <span class="custom-radio"></span>
                <span class="opt-text">${opt}</span>
              </label>
            `).join('')}
          </div>
        `;
        
        // Bind radio toggle handlers
        group.querySelectorAll('.quiz-opt-label').forEach(label => {
          label.addEventListener('click', () => {
            if (submitBtn.disabled) return;
            group.querySelectorAll('.quiz-opt-label').forEach(l => l.classList.remove('selected'));
            label.classList.add('selected');
          });
        });

        questionsBox.appendChild(group);
      });
    }

    function resetActiveTest() {
      activeTestPanel.classList.add('hidden');
      selectorView.classList.remove('hidden');
      questionsBox.innerHTML = '';
      resultsFeedback.classList.add('hidden');
    }

    cancelBtn.addEventListener('click', resetActiveTest);

    submitBtn.addEventListener('click', () => {
      const questions = eapcetData[activeSubject].tests[activeTestNum];
      let score = 0;
      let allAnswered = true;

      questions.forEach((q, idx) => {
        const checkedInput = questionsBox.querySelector(`input[name="q_${idx}"]:checked`);
        if (!checkedInput) {
          allAnswered = false;
          return;
        }

        const selectedIndex = parseInt(checkedInput.value);
        const labels = questionsBox.querySelectorAll(`.quiz-question-group`)[idx].querySelectorAll('.quiz-opt-label');

        // Reset label classes
        labels.forEach(l => l.classList.remove('correct', 'wrong'));

        if (selectedIndex === q.a) {
          score++;
          labels[selectedIndex].classList.add('correct');
        } else {
          labels[selectedIndex].classList.add('wrong');
          labels[q.a].classList.add('correct');
        }
      });

      if (!allAnswered) {
        alert("Please complete all questions before submitting!");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.5';

      if (score === 3) {
        resultsFeedback.className = 'quiz-feedback success';
        resultsFeedback.innerHTML = `<strong>Perfect Score! 3/3 Correct.</strong> Congratulations! Confetti blast deployed.`;
        resultsFeedback.classList.remove('hidden');
        triggerConfetti();
      } else {
        resultsFeedback.className = 'quiz-feedback error';
        resultsFeedback.innerHTML = `<strong>Result: ${score}/3 Correct.</strong> Review green options and try again.`;
        resultsFeedback.classList.remove('hidden');
      }

      // Lock inputs
      questionsBox.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
    });

    // Confetti System
    function triggerConfetti() {
      const container = document.createElement('div');
      container.style.position = 'fixed';
      container.style.top = '0';
      container.style.left = '0';
      container.style.width = '100%';
      container.style.height = '100%';
      container.style.pointerEvents = 'none';
      container.style.zIndex = '9999';
      document.body.appendChild(container);

      const colors = ['#00f2fe', '#ff007f', '#9d4edd', '#39ff14', '#ffea00'];

      // Left blast
      launchCloud(0, window.innerHeight, 45, container, colors);
      // Right blast
      launchCloud(window.innerWidth, window.innerHeight, 135, container, colors);

      setTimeout(() => {
        document.body.removeChild(container);
      }, 5000);
    }

    function launchCloud(startX, startY, angleDeg, container, colors) {
      for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.style.position = 'absolute';
        particle.style.left = `${startX}px`;
        particle.style.top = `${startY}px`;
        particle.style.width = `${Math.random() * 8 + 6}px`;
        particle.style.height = `${Math.random() * 12 + 6}px`;
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        particle.style.borderRadius = '2px';
        
        const angle = (angleDeg + (Math.random() * 40 - 20)) * Math.PI / 180;
        const speed = Math.random() * 18 + 12;
        
        let velX = Math.cos(angle) * speed;
        let velY = -Math.sin(angle) * speed;
        let posX = startX;
        let posY = startY;
        let rotation = Math.random() * 360;
        let rotSpeed = Math.random() * 15 - 7.5;
        
        container.appendChild(particle);

        function update() {
          velY += 0.45; // gravity
          velX *= 0.98; // air drag
          posX += velX;
          posY += velY;
          rotation += rotSpeed;

          particle.style.left = `${posX}px`;
          particle.style.top = `${posY}px`;
          particle.style.transform = `rotate(${rotation}deg)`;

          if (posY < window.innerHeight + 50) {
            requestAnimationFrame(update);
          }
        }
        requestAnimationFrame(update);
      }
    }

    // Always sliding options switcher
    const tabList = document.querySelector('.tab-list');
    let autoSlideInterval;
    function startAutoSlide() {
      autoSlideInterval = setInterval(() => {
        if (!selectorView.classList.contains('hidden')) {
          const buttons = Array.from(tabBtns);
          const currentIndex = buttons.findIndex(b => b.classList.contains('active'));
          const nextIndex = (currentIndex + 1) % buttons.length;
          buttons[nextIndex].click();
        }
      }, 7000);
    }
    if (tabList) {
      tabList.addEventListener('mouseenter', () => clearInterval(autoSlideInterval));
      tabList.addEventListener('mouseleave', startAutoSlide);
    }
    startAutoSlide();

    // Initialize
    renderSubjectDetails();
  </script>

</body>
