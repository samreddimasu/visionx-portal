<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAWCET - Testing Center</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- CSS Styles -->
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background-color: #030307;
      color: #f3f4f6;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .testing-layout {
      max-width: 1200px;
      margin: 100px auto 40px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 30px;
    }
    .testing-sidebar {
      background: rgba(10, 10, 18, 0.45);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 20px;
      height: fit-content;
    }
    .sidebar-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: 0 0 8px var(--neon-cyan-glow);
      letter-spacing: 1px;
      margin-bottom: 20px;
      font-family: var(--font-cyber);
    }
    .tab-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tab-btn-item {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      color: #9ca3af;
      border-radius: 12px;
      padding: 12px 16px;
      text-align: left;
      font-family: var(--font-cyber);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tab-btn-item:hover {
      background: rgba(0, 242, 254, 0.05);
      color: #fff;
      border-color: rgba(0, 242, 254, 0.3);
    }
    .tab-btn-item.active {
      background: linear-gradient(135deg, rgba(0, 242, 254, 0.15), rgba(157, 78, 221, 0.15));
      color: #fff;
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
    }
    .testing-main-panel {
      background: rgba(10, 10, 18, 0.45);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 35px;
      position: relative;
    }
    .tests-header-block {
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }
    .tests-title {
      font-size: 26px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 5px;
      font-family: var(--font-cyber);
    }
    .tests-desc {
      color: #9ca3af;
      font-size: 14px;
    }
    .test-list-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .test-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }
    .test-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateX(4px);
    }
    .test-info h5 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }
    .test-info p {
      font-size: 12px;
      color: #9ca3af;
    }
    @media (max-width: 900px) {
      .testing-layout {
        grid-template-columns: 1fr;
        margin-top: 80px;
      }
    }
  </style>
</head>
<body class="apple-theme">
  <!-- Ambient Glows -->
  <div class="ambient-glows">
    <div class="glow-sphere glow-sphere-1" style="background: radial-gradient(circle, rgba(157, 78, 221, 0.18) 0%, transparent 70%);"></div>
    <div class="glow-sphere glow-sphere-2" style="background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, transparent 70%);"></div>
  </div>

  <!-- Graduation Cap Background -->
  <div id="bg-grad-cap" class="corner-grad-cap">
    <i class="fa-solid fa-graduation-cap"></i>
  </div>

  <!-- Top Navigation Bar -->
  <nav class="top-nav glassmorphic">
    <div class="nav-brand">
      <i class="fa-solid fa-graduation-cap logo-icon"></i>
      <span>VISION<span class="neon-purple-text">X</span> // LAWCET EXAMS</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a>
    </div>
  </nav>

  <div class="testing-layout">
    <!-- Sidebar -->
    <aside class="testing-sidebar">
      <h4 class="sidebar-title"><i class="fa-solid fa-graduation-cap"></i> EXAM SUBJECTS</h4>
      <div class="tab-list">
        <button class="tab-btn-item active" data-subj="gk">🧠 General Knowledge</button>
        <button class="tab-btn-item" data-subj="current">📰 Current Affairs</button>
        <button class="tab-btn-item" data-subj="apt">⚖️ Legal Aptitude</button>
        <button class="tab-btn-item" data-subj="const">📜 Constitutional Law</button>
        <button class="tab-btn-item" data-subj="contract">🤝 Law of Contracts</button>
        <button class="tab-btn-item" data-subj="crime">⛓️ Criminal Law</button>
      </div>
    </aside>

    <!-- Main Exam Panel -->
    <main class="testing-main-panel">
      <!-- Exam Selector View -->
      <div id="exam-selector-view">
        <div class="tests-header-block">
          <h2 id="disp-title" class="tests-title">General Knowledge</h2>
          <p id="disp-desc" class="tests-desc">Build broad cognitive parameters: Indian Geography, History, General Science, and Civic structures.</p>
        </div>
        <div id="tests-list-container" class="test-list-box">
          <!-- Dynamically generated tests list -->
        </div>
      </div>

      <!-- Active Test Taker Area (Hidden by default) -->
      <div id="active-test-panel" class="active-test-panel hidden" style="margin-top: 0;">
        <div class="test-header">
          <h4 id="active-test-title">Mock Test 1: General Knowledge</h4>
          <button id="cancel-test-btn" class="action-btn-outline">Cancel Test</button>
        </div>
        <div id="test-questions-box">
          <!-- Dynamic Questions Load Here -->
        </div>
        <button id="submit-test-btn" class="action-btn neon-btn-green">SUBMIT MOCK TEST</button>
        <div id="test-results-feedback" class="quiz-feedback hidden"></div>
      </div>
    </main>
  </div>

  <script>
    // LAWCET Subject Syllabi & Mock Exams Data
    const lawcetData = {
      gk: {
        title: "General Knowledge",
        description: "Build broad cognitive parameters: Indian Geography, History, General Science, and Civic structures.",
        tests: {
          1: [
            { q: "Who was the first President of India?", o: ["Dr. B.R. Ambedkar", "Dr. Rajendra Prasad", "Jawaharlal Nehru", "Dr. S. Radhakrishnan"], a: 1 },
            { q: "The capital of India was shifted from Calcutta to Delhi in which year?", o: ["1905", "1911", "1919", "1947"], a: 1 },
            { q: "Which river is known as the 'Ganges of the South'?", o: ["Krishna", "Godavari", "Cauvery", "Narmada"], a: 1 }
          ],
          2: [
            { q: "The classical dance form 'Kathakali' originated in which state?", o: ["Tamil Nadu", "Karnataka", "Kerala", "Andhra Pradesh"], a: 2 },
            { q: "Which planet is known as the 'Red Planet'?", o: ["Venus", "Mars", "Jupiter", "Saturn"], a: 1 },
            { q: "The study of coins is known as:", o: ["Numismatics", "Epigraphy", "Archaeology", "Paleography"], a: 0 }
          ],
          3: [
            { q: "Which gas is most abundant in the Earth's atmosphere?", o: ["Oxygen", "Carbon Dioxide", "Nitrogen", "Hydrogen"], a: 2 },
            { q: "Who wrote the national anthem 'Jana Gana Mana'?", o: ["Bankim Chandra Chatterjee", "Rabindranath Tagore", "Sarojini Naidu", "Sri Aurobindo"], a: 1 },
            { q: "The legislative powers in India are vested in:", o: ["The Prime Minister", "The President", "The Parliament", "The Supreme Court"], a: 2 }
          ]
        }
      },
      current: {
        title: "Current Affairs",
        description: "Review current national and international events, legal landmarks, and socio-economic updates.",
        tests: {
          1: [
            { q: "Who is the current Chief Justice of India?", o: ["Justice D.Y. Chandrachud", "Justice Sanjiv Khanna", "Justice U.U. Lalit", "Justice N.V. Ramana"], a: 1 },
            { q: "Which country hosted the G20 Summit in 2023?", o: ["Indonesia", "India", "Brazil", "South Africa"], a: 1 },
            { q: "Which space agency launched the 'Aditya-L1' solar mission?", o: ["NASA", "ESA", "ISRO", "JAXA"], a: 2 }
          ],
          2: [
            { q: "The Nobel Peace Prize for 2023 was awarded to Narges Mohammadi for her fight against the oppression of women in:", o: ["Iran", "Afghanistan", "Syria", "Iraq"], a: 0 },
            { q: "Which state recently passed a Uniform Civil Code (UCC) bill first in legislative assembly?", o: ["Goa", "Uttarakhand", "Gujarat", "Uttar Pradesh"], a: 1 },
            { q: "The Dadasaheb Phalke Lifetime Achievement Award for 2023 was presented to:", o: ["Waheeda Rehman", "Asha Parekh", "Rajinikanth", "Amitabh Bachchan"], a: 0 }
          ],
          3: [
            { q: "Who won the ICC Men's Cricket World Cup 2023?", o: ["India", "Australia", "South Africa", "New Zealand"], a: 1 },
            { q: "The newly inaugurated Ram Mandir in Ayodhya is designed in which style of architecture?", o: ["Nagara Style", "Dravida Style", "Vesara Style", "Indo-Islamic Style"], a: 0 },
            { q: "What is the rank of India in the Global Innovation Index 2023?", o: ["40th", "46th", "52nd", "35th"], a: 0 }
          ]
        }
      },
      apt: {
        title: "Legal Aptitude",
        description: "Master legal reasoning: Study of law, legal concepts, case study analytical analysis, and jurisprudence.",
        tests: {
          1: [
            { q: "What does the legal maxim 'Caveat Emptor' mean?", o: ["Buyer beware", "Seller beware", "Let the document speak", "Nothing is void"], a: 0 },
            { q: "A contract with a minor is:", o: ["Voidable", "Void ab initio (void from beginning)", "Valid", "Enforceable"], a: 1 },
            { q: "The law of torts is primarily based on:", o: ["Codified statutes", "Judicial precedents (Common Law)", "International treaties", "Local customs"], a: 1 }
          ],
          2: [
            { q: "What does 'Volenti non fit injuria' mean?", o: ["To a willing person, no injury is done", "Injury without damage", "Damage without injury", "An act of God"], a: 0 },
            { q: "Which of the following is NOT an essential element of a tort?", o: ["Wrongful act", "Legal damage", "Breach of contract", "Legal remedy"], a: 2 },
            { q: "The Supreme Court of India is located in:", o: ["Mumbai", "Kolkata", "Chennai", "New Delhi"], a: 3 }
          ],
          3: [
            { q: "What does 'Res Ipsa Loquitur' mean?", o: ["The thing speaks for itself", "Under judicial review", "Reason for deciding", "An act of law"], a: 0 },
            { q: "The term of office for a Supreme Court judge in India is up to the age of:", o: ["60 years", "62 years", "65 years", "70 years"], a: 2 },
            { q: "A proposal when accepted becomes a:", o: ["Contract", "Agreement", "Promise", "Treaty"], a: 2 }
          ]
        }
      },
      const: {
        title: "Constitutional Law",
        description: "Study the Indian Constitution: Preamble, Fundamental Rights, Directive Principles, and Parliamentary Powers.",
        tests: {
          1: [
            { q: "Who is known as the chief architect of the Indian Constitution?", o: ["Dr. Rajendra Prasad", "Jawaharlal Nehru", "Dr. B.R. Ambedkar", "Mahatma Gandhi"], a: 2 },
            { q: "Which article of the Indian Constitution guarantees the Right to Equality?", o: ["Article 14", "Article 19", "Article 21", "Article 32"], a: 0 },
            { q: "Fundamental Duties were incorporated into the Constitution by which amendment?", o: ["42nd Amendment", "44th Amendment", "52nd Amendment", "86th Amendment"], a: 0 }
          ],
          2: [
            { q: "The Preamble to the Indian Constitution was amended only once. In which year?", o: ["1950", "1976", "1978", "1986"], a: 1 },
            { q: "Which Article is referred to as the 'Heart and Soul of the Constitution' by Dr. B.R. Ambedkar?", o: ["Article 14", "Article 19", "Article 21", "Article 32 (Right to Constitutional Remedies)"], a: 3 },
            { q: "The Directive Principles of State Policy are borrowed from the constitution of:", o: ["USA", "UK", "Ireland", "Australia"], a: 2 }
          ],
          3: [
            { q: "Who appoints the Governor of a State in India?", o: ["The Prime Minister", "The President of India", "The Chief Justice of India", "The Chief Minister"], a: 1 },
            { q: "The minimum age required to become the Prime Minister of India is:", o: ["21 years", "25 years", "30 years", "35 years"], a: 1 },
            { q: "Which schedule of the Indian Constitution contains the list of official languages?", o: ["7th Schedule", "8th Schedule", "9th Schedule", "10th Schedule"], a: 1 }
          ]
        }
      },
      contract: {
        title: "Law of Contracts",
        description: "Understand foundational civil law: Offer & Acceptance, Consideration, Void Agreements, and civil negligence liabilities.",
        tests: {
          1: [
            { q: "An agreement enforceable by law is a:", o: ["Promise", "Proposal", "Contract", "Obligation"], a: 2 },
            { q: "Consideration in a contract must be:", o: ["Adequate", "Real and of some value in the eyes of law", "Equivalent to the promise", "In cash only"], a: 1 },
            { q: "Which of the following agreements is void?", o: ["Agreement in restraint of marriage", "Agreement in restraint of trade", "Agreement by way of wager", "All of the above"], a: 3 }
          ],
          2: [
            { q: "Consent is said to be free when it is not caused by:", o: ["Coercion", "Undue influence", "Fraud or Misrepresentation", "All of the above"], a: 3 },
            { q: "A contract is discharged by:", o: ["Performance", "Mutual agreement", "Impossibility of performance", "All of the above"], a: 3 },
            { q: "The remedy of damages in case of breach of contract is aimed at:", o: ["Punishing the defaulting party", "Compensating the injured party for loss suffered", "Enforcing specific performance", "Rewriting the contract terms"], a: 1 }
          ],
          3: [
            { q: "An agreement made without consideration is:", o: ["Voidable", "Void", "Valid", "Illegal"], a: 1 },
            { q: "Who is competent to contract?", o: ["A person of sound mind", "A major", "A person not disqualified by law", "All of the above"], a: 3 },
            { q: "A contingent contract is a contract to do or not to do something, if some event, collateral to such contract:", o: ["Does happen", "Does not happen", "Happens or does not happen", "Is impossible"], a: 2 }
          ]
        }
      },
      crime: {
        title: "Criminal Law",
        description: "Understand criminal liability: IPC basics, offences against human body, property, and general exceptions.",
        tests: {
          1: [
            { q: "The Indian Penal Code (IPC) was drafted in which year?", o: ["1860", "1872", "1882", "1908"], a: 0 },
            { q: "Which of the following is NOT an essential element of a crime?", o: ["Human being", "Mens rea", "Actus reus", "Motive"], a: 3 },
            { q: "The age of absolute immunity from criminal liability for a child under IPC is up to:", o: ["7 years", "12 years", "16 years", "18 years"], a: 0 }
          ],
          2: [
            { q: "Culpable homicide is defined under which section of IPC?", o: ["Section 299", "Section 300", "Section 302", "Section 304"], a: 0 },
            { q: "The offence of theft requires moving of:", o: ["Movable property", "Immovable property", "Both movable & immovable", "Valuable security only"], a: 0 },
            { q: "Right of private defense of body extends to causing death if the offense causes reasonable apprehension of:", o: ["Death or grievous hurt", "Simple hurt", "Theft", "Mischief"], a: 0 }
          ],
          3: [
            { q: "Which section of IPC deals with 'Kidnapping'?", o: ["Section 359", "Section 362", "Section 375", "Section 378"], a: 0 },
            { q: "Dacoity requires a minimum of how many persons?", o: ["2", "5", "10", "15"], a: 1 },
            { q: "Nothing is an offence which is done by a person who, at the time of doing it, by reason of unsoundness of mind, is incapable of knowing the:", o: ["Nature of the act", "Law of the land", "Name of the victim", "Social consequences"], a: 0 }
          ]
        }
      }
    };

    let activeSubject = 'gk';
    let activeTestNum = 1;

    // Selectors
    const tabBtns = document.querySelectorAll('.tab-btn-item');
    const dispTitle = document.getElementById('disp-title');
    const dispDesc = document.getElementById('disp-desc');
    const selectorView = document.getElementById('exam-selector-view');
    const testsList = document.getElementById('tests-list-container');

    const activeTestPanel = document.getElementById('active-test-panel');
    const activeTestTitle = document.getElementById('active-test-title');
    const questionsBox = document.getElementById('test-questions-box');
    const submitBtn = document.getElementById('submit-test-btn');
    const cancelBtn = document.getElementById('cancel-test-btn');
    const resultsFeedback = document.getElementById('test-results-feedback');

    // Tab Handlers
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSubject = btn.getAttribute('data-subj');
        resetActiveTest();
        renderSubjectDetails();
      });
    });

    function renderSubjectDetails() {
      const data = lawcetData[activeSubject];
      dispTitle.innerText = data.title;
      dispDesc.innerText = data.description;

      testsList.innerHTML = '';
      
      const testsMeta = [
        { level: "Foundation Level", xp: "10 XP", focus: "General Syllabus Intro" },
        { level: "Intermediate Level", xp: "15 XP", focus: "Act / Clause Applications" },
        { level: "Advanced Level", xp: "25 XP", focus: "Analytical Legal Case scenarios" }
      ];

      [1, 2, 3].forEach(num => {
        const meta = testsMeta[num - 1];
        const card = document.createElement('div');
        card.className = 'test-card';
        card.innerHTML = `
          <div class="test-info">
            <h5>Mock Test ${num}: ${meta.level}</h5>
            <p>3 Questions • ${meta.xp} Reward • ${meta.focus}</p>
          </div>
          <button class="action-btn neon-btn-cyan start-test-btn" data-test="${num}">START TEST</button>
        `;
        
        card.querySelector('.start-test-btn').addEventListener('click', () => {
          activeTestNum = num;
          startMockTest();
        });
        
        testsList.appendChild(card);
      });
    }

    function startMockTest() {
      selectorView.classList.add('hidden');
      activeTestPanel.classList.remove('hidden');

      const questions = lawcetData[activeSubject].tests[activeTestNum];
      activeTestTitle.innerText = `Mock Test ${activeTestNum}: ${activeSubject.toUpperCase()}`;
      
      questionsBox.innerHTML = '';
      resultsFeedback.classList.add('hidden');
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';

      questions.forEach((q, idx) => {
        const group = document.createElement('div');
        group.className = 'quiz-question-group';
        group.innerHTML = `
          <p class="question-text">${idx + 1}. ${q.q}</p>
          <div class="quiz-options-col">
            ${q.o.map((opt, oIdx) => `
              <label class="quiz-opt-label">
                <input type="radio" name="q_${idx}" value="${oIdx}">
                <span class="custom-radio"></span>
                <span class="opt-text">${opt}</span>
              </label>
            `).join('')}
          </div>
        `;
        
        // Bind radio toggle handlers
        group.querySelectorAll('.quiz-opt-label').forEach(label => {
          label.addEventListener('click', () => {
            if (submitBtn.disabled) return;
            group.querySelectorAll('.quiz-opt-label').forEach(l => l.classList.remove('selected'));
            label.classList.add('selected');
          });
        });

        questionsBox.appendChild(group);
      });
    }

    function resetActiveTest() {
      activeTestPanel.classList.add('hidden');
      selectorView.classList.remove('hidden');
      questionsBox.innerHTML = '';
      resultsFeedback.classList.add('hidden');
    }

    cancelBtn.addEventListener('click', resetActiveTest);

    submitBtn.addEventListener('click', () => {
      const questions = lawcetData[activeSubject].tests[activeTestNum];
      let score = 0;
      let allAnswered = true;

      questions.forEach((q, idx) => {
        const checkedInput = questionsBox.querySelector(`input[name="q_${idx}"]:checked`);
        if (!checkedInput) {
          allAnswered = false;
          return;
        }

        const selectedIndex = parseInt(checkedInput.value);
        const labels = questionsBox.querySelectorAll(`.quiz-question-group`)[idx].querySelectorAll('.quiz-opt-label');

        // Reset label classes
        labels.forEach(l => l.classList.remove('correct', 'wrong'));

        if (selectedIndex === q.a) {
          score++;
          labels[selectedIndex].classList.add('correct');
        } else {
          labels[selectedIndex].classList.add('wrong');
          labels[q.a].classList.add('correct');
        }
      });

      if (!allAnswered) {
        alert("Please complete all questions before submitting!");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.5';

      if (score === 3) {
        resultsFeedback.className = 'quiz-feedback success';
        resultsFeedback.innerHTML = `<strong>Perfect Score! 3/3 Correct.</strong> Congratulations! Confetti blast deployed.`;
        resultsFeedback.classList.remove('hidden');
        triggerConfetti();
      } else {
        resultsFeedback.className = 'quiz-feedback error';
        resultsFeedback.innerHTML = `<strong>Result: ${score}/3 Correct.</strong> Review green options and try again.`;
        resultsFeedback.classList.remove('hidden');
      }

      // Lock inputs
      questionsBox.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
    });

    // Confetti System
    function triggerConfetti() {
      const container = document.createElement('div');
      container.style.position = 'fixed';
      container.style.top = '0';
      container.style.left = '0';
      container.style.width = '100%';
      container.style.height = '100%';
      container.style.pointerEvents = 'none';
      container.style.zIndex = '9999';
      document.body.appendChild(container);

      const colors = ['#00f2fe', '#ff007f', '#9d4edd', '#39ff14', '#ffea00'];

      // Left blast
      launchCloud(0, window.innerHeight, 45, container, colors);
      // Right blast
      launchCloud(window.innerWidth, window.innerHeight, 135, container, colors);

      setTimeout(() => {
        document.body.removeChild(container);
      }, 5000);
    }

    function launchCloud(startX, startY, angleDeg, container, colors) {
      for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.style.position = 'absolute';
        particle.style.left = `${startX}px`;
        particle.style.top = `${startY}px`;
        particle.style.width = `${Math.random() * 8 + 6}px`;
        particle.style.height = `${Math.random() * 12 + 6}px`;
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        particle.style.borderRadius = '2px';
        
        const angle = (angleDeg + (Math.random() * 40 - 20)) * Math.PI / 180;
        const speed = Math.random() * 18 + 12;
        
        let velX = Math.cos(angle) * speed;
        let velY = -Math.sin(angle) * speed;
        let posX = startX;
        let posY = startY;
        let rotation = Math.random() * 360;
        let rotSpeed = Math.random() * 15 - 7.5;
        
        container.appendChild(particle);

        function update() {
          velY += 0.45; // gravity
          velX *= 0.98; // air drag
          posX += velX;
          posY += velY;
          rotation += rotSpeed;

          particle.style.left = `${posX}px`;
          particle.style.top = `${posY}px`;
          particle.style.transform = `rotate(${rotation}deg)`;

          if (posY < window.innerHeight + 50) {
            requestAnimationFrame(update);
          }
        }
        requestAnimationFrame(update);
      }
    }

    // Always sliding options switcher
    const tabList = document.querySelector('.tab-list');
    let autoSlideInterval;
    function startAutoSlide() {
      autoSlideInterval = setInterval(() => {
        if (!selectorView.classList.contains('hidden')) {
          const buttons = Array.from(tabBtns);
          const currentIndex = buttons.findIndex(b => b.classList.contains('active'));
          const nextIndex = (currentIndex + 1) % buttons.length;
          buttons[nextIndex].click();
        }
      }, 7000);
    }
    if (tabList) {
      tabList.addEventListener('mouseenter', () => clearInterval(autoSlideInterval));
      tabList.addEventListener('mouseleave', startAutoSlide);
    }
    startAutoSlide();

    // Initialize
    renderSubjectDetails();
  </script>
